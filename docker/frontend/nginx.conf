# SPA fallback: any unmatched path serves index.html so client-side routing works.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|woff2?|ttf|ico)$ {
        try_files $uri =404;
        expires 7d;
        access_log off;
    }
}
