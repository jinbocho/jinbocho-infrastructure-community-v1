# Community edition — build backend services from local source checkouts in
# this workspace (../jinbocho-auth-v1, ../jinbocho-catalog-v1,
# ../jinbocho-api-gateway-v1). AI module not included — see
# docker-compose.pro.local.yml for that. For contributors working on
# service code; no GHCR pull, always rebuilds.
#
#   docker compose -f docker-compose.community.local.yml up --build -d
#
# For a pre-built, no-checkout install use docker-compose.community.yml instead.
#
# `name:` and the volume `name:` overrides below are pinned so dev Postgres
# data survives regardless of project-directory path/name — Compose-managed
# volume names are otherwise derived from the project name, which silently
# changes data volumes if the checkout path or invocation context changes.
name: jinbocho-local

services:
  postgres-auth:
    image: postgres:16-alpine
    container_name: jinbocho-postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
      - ../init-sql/auth:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jinbocho-network

  postgres-catalog:
    image: postgres:16-alpine
    container_name: jinbocho-postgres-catalog
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_catalog_data:/var/lib/postgresql/data
      - ../init-sql/catalog:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jinbocho-network

  auth-service:
    build:
      context: ../../jinbocho-auth-v1
    container_name: jinbocho-auth
    env_file:
      - ../envs/auth-service.env   # copy from auth-service.env.example and fill in values
    ports:
      # localhost-only: internal service, public access goes via the gateway (:8000)
      - "127.0.0.1:8001:8001"
    depends_on:
      postgres-auth:
        condition: service_healthy
    networks:
      - jinbocho-network

  catalog-service:
    build:
      context: ../../jinbocho-catalog-v1
    container_name: jinbocho-catalog
    env_file:
      - ../envs/catalog-service.env   # copy from catalog-service.env.example and fill in values
    ports:
      # localhost-only: internal service, public access goes via the gateway (:8000)
      - "127.0.0.1:8002:8002"
    depends_on:
      postgres-catalog:
        condition: service_healthy
    networks:
      - jinbocho-network

  api-gateway:
    build:
      context: ../../jinbocho-api-gateway-v1
    container_name: jinbocho-api-gateway
    env_file:
      - ../envs/api-gateway.env   # copy from api-gateway.env.example and fill in values
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - catalog-service
    networks:
      - jinbocho-network

  # Observability (ADR-012) — off by default; enable with:
  #   docker compose -f docker-compose.community.local.yml --profile observability up -d
  # Local collector that scrapes /metrics, receives OTLP traces, tails
  # container logs, and forwards all three to Grafana Cloud. See
  # ../config.alloy for the pipeline and required env vars.
  alloy:
    image: grafana/alloy:v1.17.1
    container_name: jinbocho-alloy
    profiles:
      - observability
    env_file:
      - ../envs/alloy.env   # copy from alloy.env.example and fill in values
    volumes:
      - ../config.alloy:/etc/alloy/config.alloy:ro
      # Grants Alloy the same access as the host's `docker` group (root-
      # equivalent) — see the security note at the top of config.alloy.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    ports:
      - "127.0.0.1:12345:12345"   # Alloy UI — debugging only, never public
    networks:
      - jinbocho-network

networks:
  jinbocho-network:
    driver: bridge

volumes:
  postgres_auth_data:
    name: jinbocho_local_postgres_auth_data
  postgres_catalog_data:
    name: jinbocho_local_postgres_catalog_data
  alloy_data:
    name: jinbocho_local_alloy_data
