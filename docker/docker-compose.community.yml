# Community edition — pulls pre-built backend images from GHCR (no source
# checkout, no --build). AI module not included — see docker-compose.pro.yml
# (commercial) for that.
#
#   docker compose -f docker-compose.community.yml up -d
#
# To build from local source checkouts instead, use
# docker-compose.community.local.yml.
#
# `name:` and the volume `name:` overrides below are pinned so Postgres data
# survives regardless of project-directory path/name, and is shared with
# docker-compose.all.yml / docker-compose.pro.yml if you switch deployment
# topology on the same host — Compose-managed volume names are otherwise
# derived from the project name, which silently changes data volumes if the
# checkout path or invocation context ever changes.
name: jinbocho

services:
  postgres-auth:
    image: postgres:16-alpine
    container_name: jinbocho-postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
      - ../init-sql/auth:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jinbocho-network

  postgres-catalog:
    image: postgres:16-alpine
    container_name: jinbocho-postgres-catalog
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_catalog_data:/var/lib/postgresql/data
      - ../init-sql/catalog:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jinbocho-network

  auth-service:
    image: ghcr.io/jinbocho/jinbocho-auth-v1:${JINBOCHO_VERSION:-latest}
    container_name: jinbocho-auth
    env_file:
      - ../envs/auth-service.env   # copy from auth-service.env.example and fill in values
    ports:
      # localhost-only: internal service, public access goes via the gateway (:8000)
      - "127.0.0.1:8001:8001"
    depends_on:
      postgres-auth:
        condition: service_healthy
    networks:
      - jinbocho-network

  catalog-service:
    image: ghcr.io/jinbocho/jinbocho-catalog-v1:${JINBOCHO_VERSION:-latest}
    container_name: jinbocho-catalog
    env_file:
      - ../envs/catalog-service.env   # copy from catalog-service.env.example and fill in values
    ports:
      # localhost-only: internal service, public access goes via the gateway (:8000)
      - "127.0.0.1:8002:8002"
    depends_on:
      postgres-catalog:
        condition: service_healthy
    networks:
      - jinbocho-network

  api-gateway:
    image: ghcr.io/jinbocho/jinbocho-api-gateway-v1:${JINBOCHO_VERSION:-latest}
    container_name: jinbocho-api-gateway
    env_file:
      - ../envs/api-gateway.env   # copy from api-gateway.env.example and fill in values
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - catalog-service
    networks:
      - jinbocho-network

  # Observability (ADR-012) — off by default; enable with:
  #   docker compose -f docker-compose.community.yml --profile observability up -d
  # Local collector that scrapes /metrics, receives OTLP traces, tails
  # container logs, and forwards all three to Grafana Cloud. See
  # ../config.alloy for the pipeline and required env vars.
  alloy:
    image: grafana/alloy:v1.17.1
    container_name: jinbocho-alloy
    profiles:
      - observability
    env_file:
      - ../envs/alloy.env   # copy from alloy.env.example and fill in values
    volumes:
      - ../config.alloy:/etc/alloy/config.alloy:ro
      # Grants Alloy the same access as the host's `docker` group (root-
      # equivalent) — see the security note at the top of config.alloy.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    ports:
      - "127.0.0.1:12345:12345"   # Alloy UI — debugging only, never public
    networks:
      - jinbocho-network

  # Host metrics (ADR-012) — CPU/RAM/disk/load, scraped by Alloy above.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: jinbocho-node-exporter
    profiles:
      - observability
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - jinbocho-network

  # Per-container CPU/memory (ADR-012). Linux-only cgroup introspection —
  # expect this to fail health on macOS Docker Desktop; harmless since it's
  # opt-in and the target (Hetzner VPS, ADR-009) is Linux.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: jinbocho-cadvisor
    profiles:
      - observability
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - jinbocho-network

  # Postgres connection/saturation metrics (ADR-012 risk #1) — one exporter
  # per database, reusing the same POSTGRES_PASSWORD as the DB containers.
  postgres-exporter-auth:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: jinbocho-postgres-exporter-auth
    profiles:
      - observability
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres-auth:5432/auth_db?sslmode=disable"
    depends_on:
      postgres-auth:
        condition: service_healthy
    networks:
      - jinbocho-network

  postgres-exporter-catalog:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: jinbocho-postgres-exporter-catalog
    profiles:
      - observability
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres-catalog:5432/catalog_db?sslmode=disable"
    depends_on:
      postgres-catalog:
        condition: service_healthy
    networks:
      - jinbocho-network

networks:
  jinbocho-network:
    driver: bridge

volumes:
  postgres_auth_data:
    name: jinbocho_postgres_auth_data
  postgres_catalog_data:
    name: jinbocho_postgres_catalog_data
  alloy_data:
    name: jinbocho_alloy_data
