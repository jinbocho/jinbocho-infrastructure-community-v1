# Full stack — every service (incl. frontend) on a single server (any VPS).
# Backend services pull pre-built images from GHCR; the frontend is built from
# source (../jinbocho-fe) because no published frontend image exists yet.
# A Caddy reverse proxy in front terminates TLS (automatic Let's Encrypt when
# DOMAIN is a real hostname) and is the only container exposed to the host.
#
# Generated/managed by scripts/setup-vps-community.sh — see that script for
# the one-shot install flow. Manual usage:
#
#   docker compose -f docker-compose.all.yml --env-file .env up -d --build
#
# `name:` is pinned so the Compose project identity stays stable across
# re-runs from a different checkout path/directory name — otherwise Compose
# picks a new project name but tries to recreate the same fixed
# `container_name`s, which Docker refuses (name already in use by the old
# project's containers).
name: jinbocho

services:
  postgres-auth:
    image: postgres:16-alpine
    container_name: jinbocho-postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
      - ../init-sql/auth:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - jinbocho-network

  postgres-catalog:
    image: postgres:16-alpine
    container_name: jinbocho-postgres-catalog
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_catalog_data:/var/lib/postgresql/data
      - ../init-sql/catalog:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - jinbocho-network

  auth-service:
    image: ghcr.io/jinbocho/jinbocho-auth-v1:${JINBOCHO_VERSION:-latest}
    container_name: jinbocho-auth
    env_file:
      - ../envs/auth-service.env
    depends_on:
      postgres-auth:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jinbocho-network

  catalog-service:
    image: ghcr.io/jinbocho/jinbocho-catalog-v1:${JINBOCHO_VERSION:-latest}
    container_name: jinbocho-catalog
    env_file:
      - ../envs/catalog-service.env
    depends_on:
      postgres-catalog:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jinbocho-network

  api-gateway:
    image: ghcr.io/jinbocho/jinbocho-api-gateway-v1:${JINBOCHO_VERSION:-latest}
    container_name: jinbocho-api-gateway
    env_file:
      - ../envs/api-gateway.env
    depends_on:
      - auth-service
      - catalog-service
    restart: unless-stopped
    networks:
      - jinbocho-network
    # No host port published — only reachable through the Caddy reverse proxy.

  frontend:
    build:
      context: ../../jinbocho-fe
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: jinbocho-frontend
    restart: unless-stopped
    networks:
      - jinbocho-network
    # No host port published — only reachable through the Caddy reverse proxy.

  caddy:
    image: caddy:2-alpine
    container_name: jinbocho-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - api-gateway
    networks:
      - jinbocho-network

  # Observability (ADR-012) — off by default; enable with:
  #   docker compose -f docker-compose.all.yml --profile observability --env-file .env up -d
  # Local collector that scrapes /metrics, receives OTLP traces, tails
  # container logs, and forwards all three to Grafana Cloud. See
  # ../config.alloy for the pipeline and required env vars.
  alloy:
    image: grafana/alloy:v1.17.1
    container_name: jinbocho-alloy
    profiles:
      - observability
    env_file:
      - ../envs/alloy.env   # copy from alloy.env.example and fill in values
    volumes:
      - ../config.alloy:/etc/alloy/config.alloy:ro
      # Grants Alloy the same access as the host's `docker` group (root-
      # equivalent) — see the security note at the top of config.alloy.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    restart: unless-stopped
    ports:
      - "127.0.0.1:12345:12345"   # Alloy UI — debugging only, never public
    networks:
      - jinbocho-network

  # Host metrics (ADR-012) — CPU/RAM/disk/load, scraped by Alloy above.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: jinbocho-node-exporter
    profiles:
      - observability
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    networks:
      - jinbocho-network

  # Per-container CPU/memory (ADR-012). Linux-only cgroup introspection —
  # this is the deployment target (Hetzner VPS, ADR-009), so no macOS caveat here.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: jinbocho-cadvisor
    profiles:
      - observability
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped
    networks:
      - jinbocho-network

  # Postgres connection/saturation metrics (ADR-012 risk #1) — one exporter
  # per database, reusing the same POSTGRES_PASSWORD as the DB containers.
  postgres-exporter-auth:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: jinbocho-postgres-exporter-auth
    profiles:
      - observability
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres-auth:5432/auth_db?sslmode=disable"
    depends_on:
      postgres-auth:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jinbocho-network

  postgres-exporter-catalog:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: jinbocho-postgres-exporter-catalog
    profiles:
      - observability
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres-catalog:5432/catalog_db?sslmode=disable"
    depends_on:
      postgres-catalog:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jinbocho-network

networks:
  jinbocho-network:
    driver: bridge

volumes:
  postgres_auth_data:
    name: jinbocho_postgres_auth_data
  postgres_catalog_data:
    name: jinbocho_postgres_catalog_data
  caddy_data:
    name: jinbocho_caddy_data
  caddy_config:
    name: jinbocho_caddy_config
  alloy_data:
    name: jinbocho_alloy_data
